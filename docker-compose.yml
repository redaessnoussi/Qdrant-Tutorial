services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"   # REST API  (used by all projects)
      - "6334:6334"   # gRPC      (optional, exposed for completeness)
    volumes:
      - qdrant_data:/qdrant/storage   # persist your collections between restarts

volumes:
  qdrant_data:
